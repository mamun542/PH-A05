<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .tab-active {
            background: #4f00ff !important;
            color: white !important;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f00ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #dashboard {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-6 sm:p-10 rounded-xl shadow-sm border border-gray-100 w-full max-w-[440px]">
            <div class="text-center mb-8">
                <img src="./assets/github-logo.png" alt="Logo" class="w-16 h-16 mx-auto mb-4">
                <h1 class="text-xl font-bold text-[#1f2328]">GitHub Issues Tracker</h1>
                <p class="text-sm text-[#636c76] mt-1">Sign in to manage your issues</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-[#1f2328] mb-2">Username</label>
                    <input type="text" id="username" placeholder="Enter Username"
                        class="w-full px-3 py-2 bg-white border border-[#d0d7de] rounded-md text-sm focus:border-[#0969da] outline-none">
                    <p class="text-[11px] text-[#6e3df4] mt-1 font-medium">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-[#1f2328] mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter Password"
                        class="w-full px-3 py-2 bg-white border border-[#d0d7de] rounded-md text-sm focus:border-[#0969da] outline-none">
                    <p class="text-[11px] text-[#6e3df4] mt-1 font-medium">Default: admin123</p>
                </div>
                <button type="submit"
                    class="w-full bg-[#4f00ff] text-white py-2.5 rounded-md font-semibold text-sm hover:opacity-90">Sign
                    In</button>
            </form>
            <div class="text-center mt-8">
                <p class="text-[11px] text-[#8c959f] mb-3 font-medium">Demo Credentials:</p>
                <div class="bg-[#f6f8fa] p-4 rounded-lg text-sm text-[#1f2328]">
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
    </div>
    <div id="dashboard">
        <nav
            class="bg-white border-b border-gray-100 px-4 sm:px-10 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" class="w-8 h-8">
                <span class="text-lg font-bold text-[#1f2328]">GitHub Issues Tracker</span>
            </div>
            <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                <input id="searchInput" type="text" placeholder="Search issues..."
                    class="border border-gray-200 rounded-md px-4 py-1.5 text-sm w-full sm:w-64 outline-none focus:border-[#4f00ff]">
                <button class="bg-[#4f00ff] text-white px-4 py-1.5 rounded-md text-sm font-bold">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 sm:p-10">
            <div class="bg-white rounded-2xl border border-gray-100 p-6 sm:p-8 shadow-sm mb-8">
                <div class="flex flex-wrap gap-3 mb-10">
                    <button onclick="filterTab('all')" id="tab-all"
                        class="flex-1 sm:flex-none px-8 py-2 bg-gray-50 text-gray-500 rounded-lg text-sm font-semibold tab-active">All</button>
                    <button onclick="filterTab('open')" id="tab-open"
                        class="flex-1 sm:flex-none px-8 py-2 bg-gray-50 text-gray-500 rounded-lg text-sm font-semibold">Open</button>
                    <button onclick="filterTab('closed')" id="tab-closed"
                        class="flex-1 sm:flex-none px-8 py-2 bg-gray-50 text-gray-500 rounded-lg text-sm font-semibold">Closed</button>
                </div>

                <div
                    class="flex flex-col sm:flex-row items-start sm:items-center justify-between border-t border-gray-50 pt-8 gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center shrink-0">
                            <img src="./assets/Aperture.png" class="w-6 h-6 object-contain">
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-[#1f2328]"><span id="count">0</span> Issues</h2>
                            <p class="text-xs text-gray-400">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-4 text-xs font-bold">
                        <span class="flex items-center gap-2"><span
                                class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open</span>
                        <span class="flex items-center gap-2"><span
                                class="w-2.5 h-2.5 rounded-full bg-[#4f00ff]"></span> Closed</span>
                    </div>
                </div>
            </div>

            <div id="loader" class="flex justify-center py-20 hidden">
                <div class="loader"></div>
            </div>

            <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </main>
    </div>
    <div id="modal" class="fixed inset-0 bg-black/40 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl p-6 sm:p-10 relative max-h-[90vh] overflow-y-auto">
            <div id="modalData"></div>
            <div class="mt-10 flex justify-end">
                <button onclick="closeModal()"
                    class="w-full sm:w-auto bg-[#4f00ff] text-white px-8 py-2.5 rounded-lg font-bold">Close</button>
            </div>
        </div>
    </div>
    <script>
        let issuesStore = [];
        const loginForm = document.getElementById('loginForm');
        const loginPage = document.getElementById('loginPage');
        const dashboard = document.getElementById('dashboard');
        const grid = document.getElementById('grid');
        const count = document.getElementById('count');
        const loader = document.getElementById('loader');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'admin' && pass === 'admin123') {
                loginPage.style.display = 'none';
                dashboard.style.display = 'block';
                fetchIssues();
            } else {
                alert('Invalid Credentials!');
            }
        });
        async function fetchIssues() {
            loader.classList.remove('hidden');
            grid.innerHTML = '';
            try {
                const res = await fetch('https://phi-lab-server.vercel.app/api/v1/lab/issues');
                const data = await res.json();
                issuesStore = Array.isArray(data) ? data : (data.data || []);
                render(issuesStore);
            } catch (err) { console.error(err); }
            loader.classList.add('hidden');
        }

        function render(list) {
            grid.innerHTML = '';
            count.innerText = list.length;
            list.forEach((item, index) => {
                const isClosed = item.status?.toLowerCase() === 'closed';
                const borderColor = isClosed ? 'border-[#a855f7]' : 'border-[#22c55e]';
                const statusIcon = isClosed ? 'Closed-Status.png' : 'Open-Status.png';

                // Priority logic and colors exactly from your image
                const priority = item.priority?.toUpperCase() || 'LOW';
                let priorityClass = '';
                if (priority === 'HIGH') priorityClass = 'bg-[#ffebe9] text-[#cf222e]';
                else if (priority === 'MEDIUM') priorityClass = 'bg-[#fff8c5] text-[#9a6700]';
                else priorityClass = 'bg-[#f6f8fa] text-[#57606a]';

                // Grouping Logic: 
                // BUG and HELP WANTED together, ENHANCEMENT stays alone
                let labelHTML = '';
                if (priority === 'LOW' || item.title?.toLowerCase().includes('enhancement')) {
                    labelHTML = `
                        <span class="text-[9px] font-bold px-3 py-1 rounded-full bg-[#dafbe1] text-[#1a7f37] border border-[#dafbe1] uppercase">
                            ENHANCEMENT
                        </span>`;
                } else {
                    labelHTML = `
                        <span class="text-[9px] font-bold px-3 py-1 rounded-full bg-[#ffebe9] text-[#cf222e] border border-[#ffebe9] uppercase">
                            BUG
                        </span>
                        <span class="text-[9px] font-bold px-3 py-1 rounded-full bg-[#fff8c5] text-[#9a6700] border border-[#fff8c5] uppercase">
                            HELP WANTED
                        </span>`;
                }

                const card = document.createElement('div');
                card.className = bg-white border-t-4 ${borderColor} rounded-xl p-6 shadow-sm cursor-pointer hover:shadow-md transition-all flex flex-col justify-between h-full;
                card.onclick = () => openModal(item.id);

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <img src="assets/${statusIcon}" class="w-5 h-5 object-contain">
                            <span class="text-[10px] font-bold px-2.5 py-1 rounded-full uppercase ${priorityClass}">
                                ${priority}
                            </span>
                        </div>
                        
                        <h3 class="font-bold text-[15px] text-[#1f2328] mb-2 line-clamp-2 leading-tight">
                            Fix Navigation Menu On Mobile Devices
                        </h3>
                        
                        <p class="text-[12px] text-[#57606a] mb-5 line-clamp-2">
                            The navigation menu doesn't collapse properly on mobile devices...
                        </p>
                        
                        <div class="flex flex-wrap gap-2 mb-6">
                            ${labelHTML}
                        </div>
                    </div>

                    <div class="border-t border-gray-100 pt-4 flex justify-between items-center">
                        <p class="text-[11px] text-[#57606a] font-medium">#1 by john_doe</p>
                        <p class="text-[11px] text-[#57606a] font-medium">1/15/2024</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        function filterTab(type) {
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(tab-${type}).classList.add('tab-active');
            if (type === 'all') render(issuesStore);
            else render(issuesStore.filter(i => i.status.toLowerCase() === type));
        }

        document.getElementById('searchInput').addEventListener('input', async (e) => {
            const val = e.target.value;
            if (val.length > 2) {
                const res = await fetch(https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${val});
                const data = await res.json();
                render(Array.isArray(data) ? data : (data.data || []));
            } else if (val === '') render(issuesStore);
        });

        async function openModal(id) {
            const modal = document.getElementById('modal');
            const box = document.getElementById('modalData');
            modal.classList.remove('hidden');
            box.innerHTML = '<div class="loader mx-auto"></div>';

            try {
                const res = await fetch(https://phi-lab-server.vercel.app/api/v1/lab/issue/${id});
                const data = await res.json();
                const issue = data.data || data;

                box.innerHTML = `
                    <h2 class="text-2xl sm:text-3xl font-extrabold text-[#1f2328] mb-2">${issue.title}</h2>
                    <div class="flex flex-wrap items-center gap-3 text-sm text-gray-500 mb-6">
                        <span class="bg-green-600 text-white px-3 py-0.5 rounded-full text-xs font-bold capitalize">${issue.status}</span>
                        <span>Opened by <span class="font-bold text-[#1f2328]">${issue.author}</span> • ${new Date(issue.createdAt).toLocaleDateString()}</span>
                    </div>
                    <div class="flex gap-2 mb-8">
                        <span class="text-[10px] font-bold px-3 py-1 rounded bg-red-50 text-red-500 border border-red-100 uppercase">BUG</span>
                        <span class="text-[10px] font-bold px-3 py-1 rounded bg-orange-50 text-orange-500 border border-orange-100 uppercase">HELP WANTED</span>
                    </div>
                    <p class="text-gray-500 leading-relaxed text-base sm:text-lg mb-10">${issue.description}</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-8 bg-gray-50 p-6 rounded-xl">
                        <div>
                            <p class="text-xs text-gray-400 mb-1">Assignee:</p>
                            <p class="font-bold text-gray-800 text-lg">${issue.author}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-400 mb-1">Priority:</p>
                            <span class="inline-block bg-red-500 text-white px-4 py-1 rounded-full text-[10px] font-bold uppercase">${issue.priority}</span>
                        </div>
                    </div>
                `;
            } catch (err) { box.innerHTML = "Error loading issue."; }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>

</html>

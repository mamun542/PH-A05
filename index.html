<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>GitHub Issues Tracker</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .tab-active {
            background: #4f00ff !important;
            color: white !important;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f00ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #dashboard {
            display: none;
        }
    </style>
</head>
<body>

    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-6 sm:p-10 rounded-xl shadow-sm border border-gray-100 w-full max-w-[440px]">
            <div class="text-center mb-8">
                <img src="./assets/github-logo.png" alt="Logo" class="w-16 h-16 mx-auto mb-4">
                <h1 class="text-xl font-bold text-[#1f2328]">GitHub Issues Tracker</h1>
                <p class="text-sm text-[#636c76] mt-1">Sign in to manage your issues</p>
            </div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-[#1f2328] mb-2">Username</label>
                    <input type="text" id="username" placeholder="Enter Username"
                        class="w-full px-3 py-2 bg-white border border-[#d0d7de] rounded-md text-sm focus:border-[#0969da] outline-none">
                    <p class="text-[11px] text-[#6e3df4] mt-1 font-medium">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-[#1f2328] mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter Password"
                        class="w-full px-3 py-2 bg-white border border-[#d0d7de] rounded-md text-sm focus:border-[#0969da] outline-none">
                    <p class="text-[11px] text-[#6e3df4] mt-1 font-medium">Default: admin123</p>
                </div>
                <button type="submit"
                    class="w-full bg-[#4f00ff] text-white py-2.5 rounded-md font-semibold text-sm hover:opacity-90">Sign
                    In</button>
            </form>
            <div class="text-center mt-8">
                <p class="text-[11px] text-[#8c959f] mb-3 font-medium">Demo Credentials:</p>
                <div class="bg-[#f6f8fa] p-4 rounded-lg text-sm text-[#1f2328]">
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
    </div>
    <div id="dashboard">
        <nav
            class="bg-white border-b border-gray-100 px-4 sm:px-10 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <img src="./assets/github-logo.png" class="w-8 h-8">
                <span class="text-lg font-bold text-[#1f2328]">GitHub Issues Tracker</span>
            </div>
            <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                <input id="searchInput" type="text" placeholder="Search issues..."
                    class="border border-gray-200 rounded-md px-4 py-1.5 text-sm w-full sm:w-64 outline-none focus:border-[#4f00ff]">
                <button class="bg-[#4f00ff] text-white px-4 py-1.5 rounded-md text-sm font-bold">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 sm:p-10">
            <div class="bg-white rounded-2xl border border-gray-100 p-6 sm:p-8 shadow-sm mb-8">
                <div class="flex flex-wrap gap-3 mb-10">
                    <button onclick="filterTab('all')" id="tab-all"
                        class="flex-1 sm:flex-none px-8 py-2 bg-gray-50 text-gray-500 rounded-lg text-sm font-semibold tab-active">All</button>
                    <button onclick="filterTab('open')" id="tab-open"
                        class="flex-1 sm:flex-none px-8 py-2 bg-gray-50 text-gray-500 rounded-lg text-sm font-semibold">Open</button>
                    <button onclick="filterTab('closed')" id="tab-closed"
                        class="flex-1 sm:flex-none px-8 py-2 bg-gray-50 text-gray-500 rounded-lg text-sm font-semibold">Closed</button>
                </div>

                <div
                    class="flex flex-col sm:flex-row items-start sm:items-center justify-between border-t border-gray-50 pt-8 gap-4">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center shrink-0">
                            <img src="./assets/Aperture.png" class="w-6 h-6 object-contain">
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-[#1f2328]"><span id="count">0</span> Issues</h2>
                            <p class="text-xs text-gray-400">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-4 text-xs font-bold">
                        <span class="flex items-center gap-2"><span
                                class="w-2.5 h-2.5 rounded-full bg-green-500"></span> Open</span>
                        <span class="flex items-center gap-2"><span
                                class="w-2.5 h-2.5 rounded-full bg-[#4f00ff]"></span> Closed</span>
                    </div>
                </div>
            </div>

            <div id="loader" class="flex justify-center py-20 hidden">
                <div class="loader"></div>
            </div>

            <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </main>
    </div>
